<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recognition Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        h1 { margin-bottom: 1rem; color: #58a6ff; }
        .controls { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; justify-content: center; }
        button { padding: 0.75rem 1.5rem; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #30363d; }
        button.active { background: #238636; border-color: #2ea043; }
        select { padding: 0.5rem; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; }
        .status { font-size: 0.9rem; color: #8b949e; margin: 0.5rem 0; }
        .status.listening { color: #3fb950; }
        #transcript { width: 100%; max-width: 700px; min-height: 200px; margin: 1rem 0; padding: 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        .interim { color: #8b949e; font-style: italic; }
        #stats { width: 100%; max-width: 700px; padding: 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-top: 1rem; }
        #stats h3 { margin-bottom: 0.5rem; color: #58a6ff; }
        .stat-row { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid #21262d; }
    </style>
</head>
<body>
    <h1>Voice Recognition Web App</h1>

    <div class="controls">
        <select id="language">
            <option value="en-US">English (US)</option>
            <option value="pt-BR">Portuguese (Brazil)</option>
            <option value="es-ES">Spanish (Spain)</option>
            <option value="fr-FR">French (France)</option>
            <option value="de-DE">German (Germany)</option>
        </select>
        <button id="startBtn" onclick="toggleListening()">Start Listening</button>
        <button onclick="clearTranscript()">Clear</button>
        <button onclick="analyzeText()">Analyze</button>
    </div>

    <p class="status" id="status">Click "Start Listening" to begin</p>
    <div id="transcript">Transcript will appear here...</div>
    <div id="stats" style="display:none">
        <h3>Analysis</h3>
        <div id="statsContent"></div>
    </div>

    <script src="main.js"></script>
    <script>
        const voiceApp = new VoiceRecognitionApp();
        const transcriptEl = document.getElementById('transcript');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        if (VoiceRecognitionApp.isSupported()) {
            voiceApp.initialize({ continuous: true, interimResults: true });

            voiceApp.onResult = (data) => {
                let html = data.fullTranscript || '';
                if (data.interim) {
                    html += '<span class="interim">' + data.interim + '</span>';
                }
                transcriptEl.innerHTML = html || 'Listening...';
            };

            voiceApp.onEnd = () => {
                statusEl.textContent = 'Stopped';
                statusEl.className = 'status';
                startBtn.textContent = 'Start Listening';
                startBtn.classList.remove('active');
            };

            voiceApp.onError = (err) => {
                statusEl.textContent = 'Error: ' + err;
            };
        } else {
            statusEl.textContent = 'Speech Recognition is not supported in this browser.';
        }

        function toggleListening() {
            if (voiceApp.isListening) {
                voiceApp.stop();
            } else {
                const lang = document.getElementById('language').value;
                voiceApp.setLanguage(lang);
                voiceApp.start();
                statusEl.textContent = 'Listening...';
                statusEl.className = 'status listening';
                startBtn.textContent = 'Stop';
                startBtn.classList.add('active');
            }
        }

        function clearTranscript() {
            voiceApp.clear();
            transcriptEl.innerHTML = 'Transcript will appear here...';
            document.getElementById('stats').style.display = 'none';
        }

        function analyzeText() {
            const analysis = voiceApp.analyzeTranscript();
            const statsEl = document.getElementById('stats');
            const content = document.getElementById('statsContent');
            statsEl.style.display = 'block';

            let html = '';
            html += '<div class="stat-row"><span>Total Words</span><span>' + analysis.totalWords + '</span></div>';
            html += '<div class="stat-row"><span>Unique Words</span><span>' + analysis.uniqueWords + '</span></div>';
            html += '<div class="stat-row"><span>Avg Confidence</span><span>' + (analysis.averageConfidence * 100).toFixed(0) + '%</span></div>';

            if (analysis.words.length > 0) {
                html += '<h3 style="margin-top:0.5rem;color:#58a6ff">Top Words</h3>';
                analysis.words.slice(0, 10).forEach(w => {
                    html += '<div class="stat-row"><span>' + w.word + '</span><span>' + w.count + '</span></div>';
                });
            }
            content.innerHTML = html;
        }
    </script>
</body>
</html>
